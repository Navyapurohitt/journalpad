<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>journalpad — a quiet place to write</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600&family=Geist+Mono:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── MOOD THEMES ─────────────────────────────────────────────────── */
:root {
  --bg: #fdf6f0;
  --bg2: #f5ebe0;
  --text: #3d2c2c;
  --muted: #b89fa0;
  --accent: #c47c7c;
  --border: #e8d5d5;
  --overlay: rgba(253,246,240,0.90);
  --grain-opacity: 0.03;
  --transition: 0.7s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-mood="rain"] {
  --bg: #1e2433;
  --bg2: #181e2e;
  --text: #c8d4ee;
  --muted: #506080;
  --accent: #7eaad4; 
  --border: #263050;
  --overlay: rgba(30,36,51,0.92);
  --grain-opacity: 0.06;
}

[data-mood="lofi"] {
  --bg: #1e1820;
  --bg2: #160f18;
  --text: #e8d8f0;
  --muted: #7a5a80;
  --accent: #c47cc4;
  --border: #2e1a30;
  --overlay: rgba(30,24,32,0.92);
  --grain-opacity: 0.07;
}

[data-mood="focus"] {
  --bg: #f5f0fa;
  --bg2: #ece4f4;
  --text: #2d2040;
  --muted: #9080a8;
  --accent: #8060b0;
  --border: #d8cce8;
  --overlay: rgba(245,240,250,0.92);
  --grain-opacity: 0.03;
}

[data-mood="forest"] {
  --bg: #141f1a;
  --bg2: #0e1812;
  --text: #c0d8c4;
  --muted: #406050;
  --accent: #68b878;
  --border: #1c3024;
  --overlay: rgba(20,31,26,0.92);
  --grain-opacity: 0.06;
}

/* ── BASE ────────────────────────────────────────────────────────── */
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  transition: background var(--transition), color var(--transition);
}

body {
  font-family: 'Quicksand', sans-serif;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

/* Grain texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  opacity: var(--grain-opacity);
  pointer-events: none;
  z-index: 1000;
  transition: opacity var(--transition);
}

/* ── HEADER ──────────────────────────────────────────────────────── */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: 16px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 50;
  transition: background var(--transition), border-color var(--transition);
  border-bottom: 1px solid transparent;
}

header.scrolled {
  background: var(--bg);
  border-color: var(--border);
}

.logo {
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-decoration: none;
  cursor: pointer;
  transition: color 0.2s;
}
.logo:hover { color: var(--text); }

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── BUTTONS ─────────────────────────────────────────────────────── */
button {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.06em;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
  border-radius: 2px;
  padding: 7px 13px;
}

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid transparent;
}
.btn-ghost:hover {
  color: var(--text);
  border-color: var(--border);
}

.btn-primary {
  background: var(--text);
  color: var(--bg);
}
.btn-primary:hover { background: var(--accent); }

.btn-accent {
  background: var(--accent);
  color: var(--bg);
}
.btn-accent:hover { opacity: 0.85; }

/* ── MOOD SELECTOR ───────────────────────────────────────────────── */
.mood-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 14px 28px;
  z-index: 50;
  background: linear-gradient(to top, var(--bg) 60%, transparent);
  transition: background var(--transition);
}

.mood-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 10px;
  letter-spacing: 0.08em;
  transition: all 0.2s;
  border-radius: 20px;
}

.mood-btn:hover {
  color: var(--text);
  border-color: var(--accent);
}

.mood-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--bg);
}

.mood-icon { font-size: 14px; line-height: 1; }

.volume-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: 12px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.volume-wrap.visible {
  opacity: 1;
  pointer-events: all;
}

#volumeSlider {
  -webkit-appearance: none;
  width: 72px;
  height: 2px;
  background: var(--border);
  outline: none;
  border-radius: 2px;
  cursor: pointer;
  accent-color: var(--accent);
}

/* ── EDITOR ──────────────────────────────────────────────────────── */
main {
  display: flex;
  justify-content: center;
  padding: 100px 24px 100px;
  min-height: 100vh;
}

.editor-wrap {
  width: 100%;
  max-width: 660px;
  animation: fadeUp 0.7s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

#editor {
  width: 100%;
  min-height: calc(100vh - 220px);
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font-family: 'Quicksand', sans-serif;
  font-size: 19px;
  line-height: 1.9;
  color: var(--text);
  caret-color: var(--accent);
  transition: color var(--transition);
}

#editor::placeholder {
  color: var(--muted);
  font-style: normal;
  font-weight: 300;
}

.editor-meta {
  display: flex;
  gap: 20px;
  margin-top: 28px;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.05em;
  opacity: 0;
  transition: opacity 0.4s;
}
.editor-meta.visible { opacity: 1; }

/* ── MODALS ──────────────────────────────────────────────────────── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--overlay);
  backdrop-filter: blur(6px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.overlay.open { display: flex; }

.modal {
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 36px;
  max-width: 440px;
  width: 100%;
  animation: fadeUp 0.25s ease both;
  transition: background var(--transition), border-color var(--transition);
}

.modal h2 {
  font-family: 'Lora', serif;
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 6px;
}

.modal .sub {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 24px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}

.field label {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
}

.field input {
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  outline: none;
  border-radius: 2px;
  transition: border-color 0.2s, background var(--transition);
}

.field input:focus { border-color: var(--accent); }

.field input[type="checkbox"] {
  width: 16px; height: 16px;
  margin: 0;
  accent-color: var(--accent);
  cursor: pointer;
  align-self: flex-start;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.checkbox-row label {
  font-family: 'Geist Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
}

.modal-actions {
  display: flex;
  gap: 8px;
  margin-top: 24px;
}

.error-msg {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: #e05a5a;
  margin-top: 8px;
  display: none;
}
.error-msg.show { display: block; }

/* Share link box */
.link-row {
  display: flex;
  gap: 8px;
}
.link-row input {
  flex: 1;
  font-family: 'Geist Mono', monospace;
  font-size: 12px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  outline: none;
  border-radius: 2px;
}

/* View count badge */
.view-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.05em;
}

/* ── TOAST ───────────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 72px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--text);
  color: var(--bg);
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  padding: 9px 18px;
  border-radius: 2px;
  opacity: 0;
  pointer-events: none;
  transition: all 0.25s;
  letter-spacing: 0.04em;
  z-index: 999;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── LOADING ─────────────────────────────────────────────────────── */
.spinner {
  display: inline-block;
  width: 12px; height: 12px;
  border: 1px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── READONLY BANNER ─────────────────────────────────────────────── */
.readonly-banner {
  display: none;
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg2);
  border: 1px solid var(--border);
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  padding: 8px 16px;
  border-radius: 20px;
  letter-spacing: 0.05em;
  z-index: 40;
  animation: fadeUp 0.4s ease both 0.5s;
  white-space: nowrap;
}
.readonly-banner.visible { display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header id="header">
  <span class="logo" onclick="goHome()">journalpad</span>
  <div class="header-right">
    <span id="readonlyBanner" class="readonly-banner">
      <span>read only</span>
      <span id="viewCount" class="view-badge"></span>
    </span>
    <button class="btn-ghost" id="newBtn">new</button>
    <button class="btn-ghost" id="shareBtn" style="display:none">share →</button>
    <button class="btn-primary" id="saveBtn">save & share</button>
  </div>
</header>

<!-- ── EDITOR ── -->
<main>
  <div class="editor-wrap">
    <textarea id="editor" placeholder="hello, treat this as your safe personal space and vent / write / share anything you want.&#10;&#10;happy writing y'll&#10;— navya" spellcheck="true" autocomplete="off"></textarea>
    <div class="editor-meta" id="editorMeta">
      <span id="wordCount">0 words</span>
      <span id="charCount">0 chars</span>
      <span id="readTime">0 min read</span>
    </div>
  </div>
</main>

<!-- ── MOOD BAR ── -->
<div class="mood-bar">
  <button class="mood-btn" data-mood="rain" onclick="setMood('rain')">
    <span class="mood-icon">🌧</span> rain
  </button>
  <button class="mood-btn" data-mood="lofi" onclick="setMood('lofi')">
    <span class="mood-icon">🎵</span> lo-fi
  </button>
  <button class="mood-btn" data-mood="focus" onclick="setMood('focus')">
    <span class="mood-icon">◎</span> focus
  </button>
  <button class="mood-btn" data-mood="forest" onclick="setMood('forest')">
    <span class="mood-icon">🌿</span> forest
  </button>
  <div class="volume-wrap" id="volumeWrap">
    <span style="font-size:13px; color: var(--muted)">♪</span>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.4">
  </div>
</div>

<!-- ── SAVE MODAL ── -->
<div class="overlay" id="saveModal">
  <div class="modal">
    <h2>save your pad</h2>
    <p class="sub">your writing will be saved and you'll get a link to share it.</p>
    <div class="checkbox-row">
      <input type="checkbox" id="enablePassword">
      <label for="enablePassword">protect with a password</label>
    </div>
    <div class="field" id="passwordField" style="display:none">
      <label>password</label>
      <input type="password" id="passwordInput" placeholder="choose a password…">
    </div>
    <p class="error-msg" id="saveError"></p>
    <div class="modal-actions">
      <button class="btn-primary" id="confirmSaveBtn" onclick="confirmSave()">save pad</button>
      <button class="btn-ghost" onclick="closeModal('saveModal')">cancel</button>
    </div>
  </div>
</div>

<!-- ── SHARE MODAL ── -->
<div class="overlay" id="shareModal">
  <div class="modal">
    <h2>pad saved ✦</h2>
    <p class="sub" id="shareSub">share this link — anyone with it can read your pad.</p>
    <div class="field">
      <label>link</label>
      <div class="link-row">
        <input type="text" id="shareLink" readonly>
        <button class="btn-primary" onclick="copyLink()">copy</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('shareModal')">done</button>
    </div>
  </div>
</div>

<!-- ── PASSWORD UNLOCK MODAL ── -->
<div class="overlay" id="unlockModal">
  <div class="modal">
    <h2>this pad is locked</h2>
    <p class="sub">enter the password to read it.</p>
    <div class="field">
      <label>password</label>
      <input type="password" id="unlockInput" placeholder="enter password…" onkeydown="if(event.key==='Enter') unlockPad()">
    </div>
    <p class="error-msg" id="unlockError"></p>
    <div class="modal-actions">
      <button class="btn-primary" onclick="unlockPad()">unlock</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<!-- ── AUDIO ELEMENTS ── -->
<!-- Using freely available ambient audio via CDN-hosted URLs -->
<audio id="audio-rain" loop>
  <source src="https://www.soundjay.com/nature/sounds/rain-01.mp3" type="audio/mpeg">
</audio>
<audio id="audio-lofi" loop>
  <source src="https://www.soundjay.com/misc/sounds/page-flip-01a.mp3" type="audio/mpeg">
</audio>
<audio id="audio-focus" loop>
  <source src="https://www.soundjay.com/nature/sounds/wind-howling-01.mp3" type="audio/mpeg">
</audio>
<audio id="audio-forest" loop>
  <source src="https://www.soundjay.com/nature/sounds/birds-singing-01.mp3" type="audio/mpeg">
</audio>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
// Change this to your Railway backend URL after deploying
const API_BASE = 'http://localhost:8000';
;

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentMood = null;
let currentAudio = null;
let isReadonly = false;
let currentPadId = null;
let currentPassword = null;

// ── AMBIENT SOUND URLS ────────────────────────────────────────────────────────
// Using Web Audio API to generate tones as fallback — or swap with your own hosted audio
const SOUND_URLS = {
  rain:   'https://freesound.org/data/previews/346/346170_4939578-lq.mp3',
  lofi:   'https://freesound.org/data/previews/612/612092_5674468-lq.mp3',
  focus:  'https://freesound.org/data/previews/383/383928_7107617-lq.mp3',
  forest: 'https://freesound.org/data/previews/398/398936_6871071-lq.mp3',
};

// Generate ambient tones via Web Audio (works offline, no CDN needed)
let audioCtx = null;
let noiseNode = null;
let gainNode = null;
let filterNode = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

const MOOD_AUDIO = {
  rain: {
    type: 'noise', filterFreq: 600, filterType: 'lowpass', filterQ: 0.8,
    description: 'rain'
  },
  lofi: {
    type: 'noise', filterFreq: 200, filterType: 'bandpass', filterQ: 3,
    description: 'lo-fi static'
  },
  focus: {
    type: 'noise', filterFreq: 400, filterType: 'lowpass', filterQ: 0.5,
    description: 'brown noise'
  },
  forest: {
    type: 'noise', filterFreq: 2000, filterType: 'highpass', filterQ: 0.7,
    description: 'birds & wind'
  },
};

function createWhiteNoise(ctx) {
  const bufferSize = 2 * ctx.sampleRate;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const node = ctx.createBufferSource();
  node.buffer = buffer;
  node.loop = true;
  return node;
}

function createBrownNoise(ctx) {
  const bufferSize = 2 * ctx.sampleRate;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  let last = 0;
  for (let i = 0; i < bufferSize; i++) {
    const white = Math.random() * 2 - 1;
    data[i] = (last + (0.02 * white)) / 1.02;
    last = data[i];
    data[i] *= 3.5;
  }
  const node = ctx.createBufferSource();
  node.buffer = buffer;
  node.loop = true;
  return node;
}

function stopSound() {
  if (noiseNode) { try { noiseNode.stop(); } catch(e){} noiseNode = null; }
  if (gainNode) { gainNode.disconnect(); gainNode = null; }
  if (filterNode) { filterNode.disconnect(); filterNode = null; }
}

function playMoodSound(mood, volume) {
  stopSound();
  if (!mood) return;

  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();

  const cfg = MOOD_AUDIO[mood];
  gainNode = ctx.createGain();
  gainNode.gain.setValueAtTime(volume * 0.3, ctx.currentTime);

  filterNode = ctx.createBiquadFilter();
  filterNode.type = cfg.filterType;
  filterNode.frequency.value = cfg.filterFreq;
  filterNode.Q.value = cfg.filterQ;

  noiseNode = mood === 'focus' ? createBrownNoise(ctx) : createWhiteNoise(ctx);

  noiseNode.connect(filterNode);
  filterNode.connect(gainNode);
  gainNode.connect(ctx.destination);
  noiseNode.start();
}

// ── MOOD ──────────────────────────────────────────────────────────────────────
function setMood(mood) {
  const isSame = currentMood === mood;
  const volumeSlider = document.getElementById('volumeSlider');
  const vol = parseFloat(volumeSlider.value);

  if (isSame) {
    // Toggle off
    stopSound();
    currentMood = null;
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('volumeWrap').classList.remove('visible');
    document.body.removeAttribute('data-mood');
    return;
  }

  currentMood = mood;
  document.body.setAttribute('data-mood', mood);
  document.querySelectorAll('.mood-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mood === mood);
  });
  document.getElementById('volumeWrap').classList.add('visible');
  playMoodSound(mood, vol);

  // Save preference
  localStorage.setItem('pad_mood', mood);
  localStorage.setItem('pad_volume', vol);
}

document.getElementById('volumeSlider').addEventListener('input', (e) => {
  const vol = parseFloat(e.target.value);
  if (gainNode) gainNode.gain.setValueAtTime(vol * 0.3, audioCtx.currentTime);
  localStorage.setItem('pad_volume', vol);
});

// ── EDITOR ────────────────────────────────────────────────────────────────────
const editor = document.getElementById('editor');
const editorMeta = document.getElementById('editorMeta');

function updateMeta() {
  const text = editor.value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const chars = text.length;
  const readMins = Math.max(1, Math.ceil(words / 200));

  document.getElementById('wordCount').textContent = `${words} word${words !== 1 ? 's' : ''}`;
  document.getElementById('charCount').textContent = `${chars} char${chars !== 1 ? 's' : ''}`;
  document.getElementById('readTime').textContent = words > 0 ? `${readMins} min read` : '—';
  editorMeta.classList.toggle('visible', words > 0);
}

editor.addEventListener('input', () => {
  updateMeta();
  if (!isReadonly) localStorage.setItem('pad_draft', editor.value);
});

// ── TYPING SOUND ─────────────────────────────────────────────────────────────
let typingAudioCtx = null;

function playKeyClick() {
  try {
    if (!typingAudioCtx) typingAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = typingAudioCtx;
    if (ctx.state === 'suspended') ctx.resume();

    // Layer 1: sharp click transient
    const bufSize = ctx.sampleRate * 0.04;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 8);
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buf;

    // Filter to make it sound like a key
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 3200 + Math.random() * 800;
    filter.Q.value = 0.8;

    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);

    noise.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    noise.start();
    noise.stop(ctx.currentTime + 0.05);
  } catch(e) {}
}

editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart, end = editor.selectionEnd;
    editor.value = editor.value.slice(0, s) + '  ' + editor.value.slice(end);
    editor.selectionStart = editor.selectionEnd = s + 2;
  }
  // Play sound for printable keys + space + backspace
  if (e.key.length === 1 || e.key === 'Backspace' || e.key === 'Enter' || e.key === 'Tab') {
    playKeyClick();
  }
});

window.addEventListener('scroll', () => {
  document.getElementById('header').classList.toggle('scrolled', scrollY > 10);
});

// ── ROUTING (pad ID in URL path or query) ─────────────────────────────────────
function getPadIdFromUrl() {
  // Support ?id=xxx or /#xxx
  const params = new URLSearchParams(location.search);
  if (params.get('id')) return params.get('id');
  const hash = location.hash.slice(1);
  if (hash && !hash.startsWith('v1/')) return hash; // old base64 urls ignored
  return null;
}

async function loadPad(padId) {
  // First fetch meta to see if password-protected
  try {
    const res = await fetch(`${API_BASE}/pads/${padId}/meta`);
    if (!res.ok) { showToast('pad not found'); return; }
    const meta = await res.json();
    currentPadId = padId;

    if (meta.is_protected) {
      openModal('unlockModal');
    } else {
      await fetchAndShowPad(padId, null, meta.view_count);
    }
  } catch(e) {
    showToast('could not connect to server');
  }
}

async function fetchAndShowPad(padId, password, viewCount) {
  try {
    const res = await fetch(`${API_BASE}/pads/${padId}/read`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });

    if (res.status === 403 || res.status === 401) {
      document.getElementById('unlockError').textContent = 'wrong password. try again.';
      document.getElementById('unlockError').classList.add('show');
      return;
    }
    if (!res.ok) { showToast('error loading pad'); return; }

    const data = await res.json();
    editor.value = data.content;
    isReadonly = true;
    currentPassword = password;
    editor.setAttribute('readonly', '');
    editor.style.cursor = 'default';
    updateMeta();
    closeModal('unlockModal');

    // Show readonly UI
    document.getElementById('readonlyBanner').classList.add('visible');
    document.getElementById('viewCount').textContent = `· ${data.view_count} view${data.view_count !== 1 ? 's' : ''}`;
    document.getElementById('saveBtn').style.display = 'none';
    document.getElementById('shareBtn').style.display = 'inline-flex';
    document.getElementById('shareBtn').textContent = 'copy link';
    document.getElementById('shareBtn').onclick = () => {
      navigator.clipboard.writeText(location.href);
      showToast('link copied');
    };

  } catch(e) {
    showToast('could not connect to server');
  }
}

async function unlockPad() {
  const password = document.getElementById('unlockInput').value;
  if (!password) {
    document.getElementById('unlockError').textContent = 'please enter a password.';
    document.getElementById('unlockError').classList.add('show');
    return;
  }
  await fetchAndShowPad(currentPadId, password);
}

// ── SAVE ──────────────────────────────────────────────────────────────────────
document.getElementById('saveBtn').onclick = () => {
  if (!editor.value.trim()) { showToast('write something first…'); return; }
  openModal('saveModal');
};

document.getElementById('enablePassword').addEventListener('change', (e) => {
  document.getElementById('passwordField').style.display = e.target.checked ? 'flex' : 'none';
});

async function confirmSave() {
  const usePassword = document.getElementById('enablePassword').checked;
  const password = usePassword ? document.getElementById('passwordInput').value : null;

  if (usePassword && !password) {
    showError('saveError', 'please enter a password.');
    return;
  }

  const btn = document.getElementById('confirmSaveBtn');
  btn.innerHTML = '<span class="spinner"></span>saving…';
  btn.disabled = true;

  try {
    const res = await fetch(`${API_BASE}/pads`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: editor.value, password }),
    });

    if (!res.ok) { showError('saveError', 'server error. try again.'); return; }
    const data = await res.json();

    // Build share URL
    const shareUrl = `${location.origin}${location.pathname}?id=${data.id}`;
    document.getElementById('shareLink').value = shareUrl;

    const sub = data.is_protected
      ? 'this pad is password-protected. share the link and password with your reader.'
      : 'anyone with this link can read your pad.';
    document.getElementById('shareSub').textContent = sub;

    // Save to local history
    const history = JSON.parse(localStorage.getItem('pad_history') || '[]');
    history.unshift({ id: data.id, created: new Date().toISOString(), protected: data.is_protected });
    localStorage.setItem('pad_history', JSON.stringify(history.slice(0, 20)));
    localStorage.removeItem('pad_draft');

    closeModal('saveModal');
    openModal('shareModal');
  } catch(e) {
    showError('saveError', 'could not connect to server.');
  } finally {
    btn.innerHTML = 'save pad';
    btn.disabled = false;
  }
}

function copyLink() {
  navigator.clipboard.writeText(document.getElementById('shareLink').value).then(() => {
    showToast('link copied to clipboard');
  });
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', (e) => { if (e.target === el) closeModal(el.id); });
});

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}

function showToast(msg, duration = 2400) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function goHome() {
  if (isReadonly || !editor.value) {
    location.href = location.origin + location.pathname;
    return;
  }
  if (confirm('go home? unsaved changes will be cleared.')) {
    localStorage.removeItem('pad_draft');
    location.href = location.origin + location.pathname;
  }
}

document.getElementById('newBtn').onclick = () => {
  if (editor.value && !confirm('start a new pad? unsaved changes will be lost.')) return;
  localStorage.removeItem('pad_draft');
  location.href = location.origin + location.pathname;
};

// ── INIT ──────────────────────────────────────────────────────────────────────
(function init() {
  // Restore volume
  const savedVol = localStorage.getItem('pad_volume') || '0.4';
  document.getElementById('volumeSlider').value = savedVol;

  // Check if loading a pad
  const padId = getPadIdFromUrl();
  if (padId) {
    loadPad(padId);
  } else {
    // Restore draft
    const draft = localStorage.getItem('pad_draft');
    if (draft) editor.value = draft;
    editor.focus();
    updateMeta();

    // Restore mood (don't autoplay — needs user gesture)
    const savedMood = localStorage.getItem('pad_mood');
    if (savedMood) {
      document.body.setAttribute('data-mood', savedMood);
      document.querySelectorAll('.mood-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.mood === savedMood);
      });
      currentMood = savedMood;
      document.getElementById('volumeWrap').classList.add('visible');
      // Note: audio starts only on next mood click (browser autoplay policy)
      showToast(`${savedMood} mood restored — click it to start sound`, 3000);
    }
  }
})();
</script>
